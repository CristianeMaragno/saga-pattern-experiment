services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-db
    environment:
      POSTGRES_DB: travel_db
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: travel_db
      DB_USER: travel_user
      DB_PASSWORD: travel_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travel-network

  # PgAdmin para gerenciar o banco (opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: travel-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - travel-network

volumes:
  postgres_data:

networks:
  travel-network:
    driver: bridge
