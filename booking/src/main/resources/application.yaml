spring:
  application:
    name: booking-api
  
  # Desabilitar autoconfigure do DataSource (usando mock repository)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  
  # Inicialização de dados desabilitada (usando mock repository)
  sql:
    init:
      mode: never
  
  # Flag para ativar/desativar mock repository
  jpa:
    mock:
      enabled: true

# Configuração do Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

# Configuração de logs
logging:
  level:
    root: INFO
    com.tcc.booking: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data: DEBUG
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Configuração do servidor
server:
  port: 8080
  servlet:
    context-path: /
