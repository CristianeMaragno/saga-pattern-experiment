spring:
  application:
    name: booking-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking_db}
    username: ${DB_USER:booking_user}
    password: ${DB_PASSWORD:booking_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Esquema e dados de exemplo já são criados pelo init.sql do container postgres
  sql:
    init:
      mode: never

# Configuração do Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

# Configuração de logs
logging:
  level:
    root: INFO
    com.tcc.booking: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data: DEBUG
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Configuração do servidor
server:
  port: 8082
  servlet:
    context-path: /
